<svg viewBox="0 0 470 656" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anatomy of the Dynamic Island presentations for a Home Assistant Live Activity, mapping each region to its notification payload field">
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    text.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    text.head{font-weight:700;letter-spacing:0.1em;fill:#6a7280}
    text.cap{fill:#9aa1ab}
    text.num{font-weight:700;fill:#ffffff;text-anchor:middle}
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#03A9F4" stop-opacity="0.9"/><stop offset="1" stop-color="#03A9F4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b6f9e"/><stop offset="1" stop-color="#0a4f73"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="470" height="656" fill="#ffffff"/>

  <!-- ===== COMPACT ===== -->
  <text x="30" y="40" class="head" font-size="13">COMPACT</text>
  <text x="30" y="58" class="cap" font-size="12">Idle island, one activity</text>
  <rect x="178" y="70" width="148" height="42" rx="21" fill="#0b0b0e"/>
  <g transform="translate(203,91) scale(0.66)" fill="none" stroke="#7fd6f7" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-17,2 L0,-15 L17,2"/><path d="M-12,1 L-12,16 L12,16 L12,1"/>
    <circle cx="0" cy="9" r="2.3" fill="#7fd6f7" stroke="none"/><path d="M0,9 L0,3 M0,9 L-6,12 M0,9 L6,12"/>
  </g>
  <text x="310" y="97" text-anchor="end" class="mono" font-size="17" fill="#ffffff">4:50</text>
  <circle cx="178" cy="91" r="11" fill="#e8590c"/><text x="178" y="95.5" class="num" font-size="13">1</text>
  <circle cx="326" cy="91" r="11" fill="#1971c2"/><text x="326" y="95.5" class="num" font-size="13">2</text>

  <!-- ===== MINIMAL ===== -->
  <text x="30" y="150" class="head" font-size="13">MINIMAL</text>
  <text x="30" y="168" class="cap" font-size="12">When another activity shares the island</text>
  <rect x="232" y="180" width="42" height="42" rx="21" fill="#0b0b0e"/>
  <g transform="translate(253,201) scale(0.62)" fill="none" stroke="#7fd6f7" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-17,2 L0,-15 L17,2"/><path d="M-12,1 L-12,16 L12,16 L12,1"/>
    <circle cx="0" cy="9" r="2.3" fill="#7fd6f7" stroke="none"/><path d="M0,9 L0,3 M0,9 L-6,12 M0,9 L6,12"/>
  </g>
  <circle cx="232" cy="201" r="11" fill="#e8590c"/><text x="232" y="205.5" class="num" font-size="13">1</text>

  <!-- ===== EXPANDED ===== -->
  <text x="30" y="262" class="head" font-size="13">EXPANDED</text>
  <text x="30" y="280" class="cap" font-size="12">On long-press</text>
  <rect x="85" y="296" width="300" height="120" rx="27" fill="#0b0b0e"/>
  <rect x="104" y="314" width="44" height="44" rx="12" fill="url(#iconGrad)"/>
  <g transform="translate(126,336) scale(0.82)" fill="none" stroke="#7fd6f7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-17,2 L0,-15 L17,2"/><path d="M-12,1 L-12,16 L12,16 L12,1"/>
    <circle cx="0" cy="9" r="2.3" fill="#7fd6f7" stroke="none"/><path d="M0,9 L0,3 M0,9 L-6,12 M0,9 L6,12"/>
  </g>
  <text x="162" y="330" font-size="14" font-weight="600" fill="#ffffff">Washing Machine</text>
  <text x="366" y="330" text-anchor="end" class="mono" font-size="15" font-weight="600" fill="#ffffff">42%</text>
  <text x="104" y="380" font-size="12" fill="#ffffffe0">Rinsing · 1 of 2</text>
  <rect x="104" y="392" width="262" height="8" rx="4" fill="#ffffff28"/>
  <rect x="104" y="392" width="110" height="8" rx="4" fill="url(#barGrad)"/>
  <circle cx="85" cy="336" r="11" fill="#e8590c"/><text x="85" y="340.5" class="num" font-size="13">1</text>
  <circle cx="232" cy="296" r="11" fill="#7048e8"/><text x="232" y="300.5" class="num" font-size="13">3</text>
  <circle cx="385" cy="324" r="11" fill="#1971c2"/><text x="385" y="328.5" class="num" font-size="13">2</text>
  <circle cx="85" cy="380" r="11" fill="#099268"/><text x="85" y="384.5" class="num" font-size="13">4</text>
  <circle cx="300" cy="416" r="11" fill="#d6336c"/><text x="300" y="420.5" class="num" font-size="13">5</text>

  <!-- ===== LEGEND ===== -->
  <g font-size="12.5">
    <circle cx="28" cy="456" r="10" fill="#e8590c"/><text x="28" y="460.5" class="num" font-size="12">1</text>
    <text x="48" y="454" font-size="13" font-weight="700" letter-spacing="0.05em" fill="#e8590c">ICON</text>
    <text x="48" y="472" class="mono" fill="#16181d">notification_icon · notification_icon_color</text>

    <circle cx="28" cy="498" r="10" fill="#1971c2"/><text x="28" y="502.5" class="num" font-size="12">2</text>
    <text x="48" y="496" font-size="13" font-weight="700" letter-spacing="0.05em" fill="#1971c2">TRAILING VALUE</text>
    <text x="48" y="514" class="mono" fill="#16181d">chronometer · critical_text · progress</text>

    <circle cx="28" cy="540" r="10" fill="#7048e8"/><text x="28" y="544.5" class="num" font-size="12">3</text>
    <text x="48" y="538" font-size="13" font-weight="700" letter-spacing="0.05em" fill="#7048e8">TITLE</text>
    <text x="48" y="556" class="mono" fill="#16181d">title</text>

    <circle cx="28" cy="582" r="10" fill="#099268"/><text x="28" y="586.5" class="num" font-size="12">4</text>
    <text x="48" y="580" font-size="13" font-weight="700" letter-spacing="0.05em" fill="#099268">BODY</text>
    <text x="48" y="598" class="mono" fill="#16181d">message</text>

    <circle cx="28" cy="624" r="10" fill="#d6336c"/><text x="28" y="628.5" class="num" font-size="12">5</text>
    <text x="48" y="622" font-size="13" font-weight="700" letter-spacing="0.05em" fill="#d6336c">PROGRESS BAR</text>
    <text x="48" y="640" class="mono" fill="#16181d">progress / progress_max · progress_bar_color</text>
  </g>
</svg>
